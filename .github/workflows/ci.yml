name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar que shellcheck está disponible
        run: shellcheck --version

      - name: Analizar monitor.sh
        run: shellcheck monitor.sh

  smoke-test:
    name: Smoke test (MODO=once)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 2
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución
        run: chmod +x monitor.sh

      - name: Ejecutar una pasada del monitor
        env:
          MODO: once
          LOG_BASE: ${{ github.workspace }}/logs/monitor_recursos
        run: |
          mkdir -p logs
          ./monitor.sh

      - name: Mostrar log generado
        if: always()
        run: |
          echo "--- Contenido del log ---"
          cat logs/monitor_recursos_*.log || echo "(sin log)"
