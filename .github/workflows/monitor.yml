name: Monitor (scheduled)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    name: Ejecutar chequeo de recursos
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución
        run: chmod +x monitor.sh

      - name: Ejecutar monitor (una pasada)
        env:
          MODO: once
          LOG_BASE: ${{ github.workspace }}/logs/monitor_recursos
        run: |
          mkdir -p logs
          ./monitor.sh

      - name: Mostrar log generado
        if: always()
        run: |
          echo "--- Contenido del log ---"
          cat logs/monitor_recursos_*.log || echo "(sin log)"

      - name: Enviar reporte a Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Longitud token: ${#BOT_TOKEN}"
          echo "Longitud chat_id: ${#CHAT_ID}"
          curl --max-time 15 \
            --form "chat_id=${CHAT_ID}" \
            --form "text=Monitor OK" \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"

      - name: Subir logs como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
