name: Monitor (scheduled)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    name: Ejecutar chequeo de recursos
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución
        run: chmod +x monitor.sh

      - name: Ejecutar monitor (una pasada)
        env:
          MODO: once
          LOG_BASE: ${{ github.workspace }}/logs/monitor_recursos
        run: |
          mkdir -p logs
          ./monitor.sh

      - name: Mostrar log generado
        if: always()
        run: |
          echo "--- Contenido del log ---"
          cat logs/monitor_recursos_*.log || echo "(sin log)"

      - name: Enviar reporte a Telegram
        if: always()
        run: |
          LOG=$(cat logs/monitor_recursos_*.log 2>/dev/null || echo "Sin log disponible")
          MESSAGE="*Monitor GitHub Actions*%0A$(date '+%Y-%m-%d %H:%M')%0A%0A${LOG}"
          curl -s --max-time 10 -X POST \
            "https://api.telegram.org/bot${{ secrets.8510134888:AAFrNVRqdSaD8NOyxvFySPvin9G4Wyej4g4 }}/sendMessage" \
            -d "chat_id=${{ secrets.-5114113868 }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${LOG}"

      - name: Subir logs como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
